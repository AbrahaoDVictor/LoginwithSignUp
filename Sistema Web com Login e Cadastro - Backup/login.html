<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="scripts/loginScripts.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="card">
            <div class="title">
                <h1><strong>LOGIN</strong></h1>
            </div>
            <form action="#">
                <div class="input-group">
                    <label for="user" class="col-form-label">Usuário:</label>
                    <input type="text" name="user" id="user">
                </div>
                <div class="input-group">
                    <label for="pass" class="col-form-label">Senha:</label>
                    <input type="password" name="pass" id="pass">
                </div>
                    <button class="btn btn-outline-primary" type="submit" onclick="logon(event)">ENTRAR</button>
                    <a href="#"><p>Esqueci minha senha</p></a>
                </div>
            </form>
        </div>
        </div>
    </main>
</body>
</html>
